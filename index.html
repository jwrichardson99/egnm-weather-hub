<!DOCTYPE html>
<html>
<head>
    <title>EGNM Radar & Weather</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/leaflet@1.4.0/dist/leaflet.js"></script>
    <script src="https://api.windy.com/assets/map-forecast/libBoot.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: 'Courier New', monospace; color: #00ff41; }
        #windy { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #overlay {
            position: absolute; top: 15px; left: 15px; z-index: 10;
            background: rgba(0, 0, 0, 0.8); padding: 15px; border-radius: 10px;
            width: 350px; border: 1px solid #333;
        }
        .scroll-container { width: 100%; overflow: hidden; white-space: nowrap; margin: 10px 0; }
        .scroll-text { display: inline-block; animation: marquee 20s linear infinite; font-size: 1.2em; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .label { color: #fff; font-size: 0.8em; display: block; border-bottom: 1px solid #444; }
    </style>
</head>
<body>

    <div id="windy"></div>
    
    <div id="overlay">
        <span class="label">METAR - EGNM</span>
        <div class="scroll-container"><div id="metar" class="scroll-text">INITIALIZING...</div></div>
        <span class="label">TAF - EGNM</span>
        <div class="scroll-container"><div id="taf" class="scroll-text">INITIALIZING...</div></div>
        <div style="font-size: 0.7em; color: #666;">Updated: <span id="time">--:--</span></div>
    </div>

    <script>
        // 1. MAP CONFIGURATION
        const WINDY_KEY = 'EMwvN9THbhR1U1SJHzsqdHAmonM0Nhne';
        const options = { key: WINDY_KEY, lat: 53.8659, lon: -1.6606, zoom: 8 };

        windyInit(options, windyAPI => {
            const { store, broadcast } = windyAPI;
            store.set('overlay', 'radar');
            setTimeout(() => { broadcast.emit('p-play'); }, 2000);
        });

        // 2. WEATHER CONFIGURATION (Independent of Map)
        async function updateWeather() {
    const icao = 'EGNM';
    // 1. Using the absolute simplest text-only endpoint from NOAA
    const target = `https://aviationweather.gov/api/data/metar?ids=${icao}`;
    const tafTarget = `https://aviationweather.gov/api/data/taf?ids=${icao}`;
    
    // 2. Using a different, faster bridge for 2026: 'ThingProxy'
    // This proxy is often less "crowded" than AllOrigins
    const proxy = 'https://corsproxy.io/?';

    try {
        // Fetch METAR
        const mResp = await fetch(proxy + encodeURIComponent(target));
        const metarText = await mResp.text();

        // Fetch TAF
        const tResp = await fetch(proxy + encodeURIComponent(tafTarget));
        const tafText = await tResp.text();

        // Check if we actually got text back
        if (metarText && metarText.length > 5) {
            document.getElementById('metar').innerText = metarText.trim();
            document.getElementById('taf').innerText = tafText.trim() || "TAF NOT AVAILABLE";
            document.getElementById('time').innerText = "Live: " + new Date().toLocaleTimeString();
        } else {
            throw new Error("Empty response");
        }

    } catch (err) {
        console.error("Connection error:", err);
        // If the first proxy fails (522), try the emergency fallback bridge
        const fallback = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`;
        fetch(fallback).then(r => r.json()).then(j => {
            document.getElementById('metar').innerText = j.contents;
        }).catch(() => {
            document.getElementById('metar').innerText = "NOAA SERVER BUSY - RETRYING...";
        });
    }
}

        // Start weather loop immediately
        getAviationData();
        setInterval(getAviationData, 600000); 
    </script>
</body>
</html>
