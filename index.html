<!DOCTYPE html>
<html>
<head>
    <title>EGNM Radar & Weather Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/leaflet@1.4.0/dist/leaflet.js"></script>
    <script src="https://api.windy.com/assets/map-forecast/libBoot.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #windy { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #overlay {
            position: absolute; top: 15px; left: 15px; z-index: 10;
            background: rgba(0, 0, 0, 0.85); padding: 15px; border-radius: 10px;
            width: 380px; border: 1px solid #333; box-shadow: 0 0 20px rgba(0,0,0,1);
        }

        /* Layer Switcher Styling */
        #layer-picker {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 10; background: rgba(0, 0, 0, 0.8); padding: 10px;
            border-radius: 30px; border: 1px solid #444; display: flex; gap: 10px;
        }
        .layer-btn {
            background: #222; color: #fff; border: 1px solid #555; padding: 8px 15px;
            border-radius: 20px; cursor: pointer; font-size: 0.8em; transition: 0.3s;
        }
        .layer-btn:hover { background: #00ff41; color: #000; }
        .layer-btn.active { background: #00ff41; color: #000; border-color: #fff; }

        .label { color: #fff; font-size: 0.75em; display: block; border-bottom: 1px solid #444; margin-bottom: 5px; }

        .metar-container { width: 100%; overflow: hidden; white-space: nowrap; margin-bottom: 15px; }
        .metar-text {
            display: inline-block; color: #00ff41; font-size: 1.1em; font-weight: bold;
            animation: marquee-left 15s linear infinite; padding-left: 100%;
        }

        .taf-container { height: 100px; overflow: hidden; position: relative; border-left: 2px solid #00ff41; padding-left: 10px; }
        .taf-text {
            position: absolute; color: #00ff41; font-size: 1.0em; width: 100%;
            animation: scroll-up 20s linear infinite; white-space: pre-wrap; 
        }

        @keyframes marquee-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        @keyframes scroll-up { 0% { transform: translateY(100%); } 100% { transform: translateY(-100%); } }

        #time { font-size: 0.6em; color: #666; margin-top: 10px; text-align: right; }
    </style>
</head>
<body>

    <div id="windy"></div>
    
    <div id="overlay">
        <span class="label">METAR - EGNM</span>
        <div class="metar-container"><div id="metar" class="metar-text">CONNECTING...</div></div>
        <span class="label">TAF - EGNM (Upward)</span>
        <div class="taf-container"><div id="taf" class="taf-text">LOADING FORECAST...</div></div>
        <div id="time">--:--</div>
    </div>

    <div id="layer-picker">
        <button class="layer-btn active" onclick="changeLayer('radar', this)">Radar</button>
        <button class="layer-btn" onclick="changeLayer('wind', this)">Wind</button>
        <button class="layer-btn" onclick="changeLayer('temp', this)">Temp</button>
        <button class="layer-btn" onclick="changeLayer('satellite', this)">Satellite</button>
        <button class="layer-btn" onclick="changeLayer('rain', this)">Rain/Thunder</button>
        <button class="layer-btn" onclick="changeLayer('clouds', this)">Clouds</button>
    </div>

    <script>
        let W_API;
        const WINDY_KEY = 'EMwvN9THbhR1U1SJHzsqdHAmonM0Nhne';
        const options = { key: WINDY_KEY, lat: 53.8659, lon: -1.6606, zoom: 8 };

        windyInit(options, windyAPI => {
            W_API = windyAPI;
            const { store, broadcast } = W_API;
            
            store.set('baseLayer', 'dark');
            store.set('overlay', 'radar');
            store.set('isolines', 'pressure'); 
            
            setTimeout(() => { 
                broadcast.emit('p-play'); 
            }, 2500);
        });

        // Function to Switch Layers
        function changeLayer(layerName, btn) {
            if (!W_API) return;
            const { store } = W_API;
            
            // Set the new overlay
            store.set('overlay', layerName);
            
            // Keep Isobars visible (Satellite doesn't support them, so we check)
            if (layerName !== 'satellite') {
                store.set('isolines', 'pressure');
            } else {
                store.set('isolines', 'none');
            }

            // Update button UI
            document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        async function updateWeather() {
            const icao = 'EGNM';
            const proxy = 'https://corsproxy.io/?';
            const targetMetar = `https://aviationweather.gov/api/data/metar?ids=${icao}`;
            const targetTaf = `https://aviationweather.gov/api/data/taf?ids=${icao}`;

            try {
                const mResp = await fetch(proxy + encodeURIComponent(targetMetar));
                const metarText = await mResp.text();
                const tResp = await fetch(proxy + encodeURIComponent(targetTaf));
                const tafText = await tResp.text();

                if (metarText) document.getElementById('metar').innerText = metarText.trim();
                if (tafText) document.getElementById('taf').innerText = tafText.trim();
                document.getElementById('time').innerText = "Live: " + new Date().toLocaleTimeString();
            } catch (err) {
                console.error("Weather fetch failed");
            }
        }

        updateWeather();
        setInterval(updateWeather, 600000); 
    </script>
</body>
</html>
