<!DOCTYPE html>
<html>
<head>
    <title>EGNM Radar & Weather</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/leaflet@1.4.0/dist/leaflet.js"></script>
    <script src="https://api.windy.com/assets/map-forecast/libBoot.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #windy { width: 100vw; height: 100vh; }
        
        #aviation-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.85);
            color: #00ff41; /* "Matrix" green */
            padding: 15px;
            border-radius: 10px;
            width: 350px;
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,1);
        }

        .label { color: #fff; font-size: 0.75em; margin-bottom: 5px; display: block; border-bottom: 1px solid #444; }
        
        /* The Scrolling Container */
        .scroll-container {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            margin-bottom: 15px;
        }

        .scroll-text {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 20s linear infinite;
            font-size: 1.1em;
            font-weight: bold;
        }

        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        #status { font-size: 0.6em; color: #666; text-align: right; }
    </style>
</head>
<body>

    <div id="windy"></div>
    
    <div id="aviation-overlay">
        <span class="label">METAR - EGNM</span>
        <div class="scroll-container">
            <div id="metar" class="scroll-text">CONNECTING TO NOAA...</div>
        </div>

        <span class="label">TAF - EGNM</span>
        <div class="scroll-container">
            <div id="taf" class="scroll-text">WAITING FOR DATA...</div>
        </div>
        <div id="status">Updated: <span id="time">--:--</span></div>
    </div>

    <script>
        const WINDY_KEY = 'EMwvN9THbhR1U1SJHzsqdHAmonM0Nhne';

        windyInit({ key: WINDY_KEY, lat: 53.8659, lon: -1.6606, zoom: 8 }, windyAPI => {
            const { store, broadcast } = windyAPI;
            store.set('baseLayer', 'dark');
            store.set('overlay', 'radar');
            
            // Auto-play radar animation
            setTimeout(() => { broadcast.emit('p-play'); }, 2000);

           async function getAviationData() {
    const icao = 'EGNM';
    // We are using a different, simpler proxy designed for raw text
    const url = `https://api.allorigins.win/get?url=${encodeURIComponent('https://www.checkwx.com/station/' + icao)}`;

    try {
        const response = await fetch(url);
        const data = await response.json();
        const html = data.contents;

        // We are going to "scrape" the METAR right out of the webpage's code
        // This is a bit 'hacky' but it is nearly impossible to block
        const metarMatch = html.match(/METAR<\/th><td><code>(.*?)<\/code>/);
        const tafMatch = html.match(/TAF<\/th><td><code>(.*?)<\/code>/);

        if (metarMatch && metarMatch[1]) {
            document.getElementById('metar').innerText = metarMatch[1];
        } else {
            document.getElementById('metar').innerText = "STATION EGNM DATA PENDING...";
        }

        if (tafMatch && tafMatch[1]) {
            document.getElementById('taf').innerText = tafMatch[1];
        } else {
            document.getElementById('taf').innerText = "NO TAF ISSUED FOR THIS PERIOD";
        }

        document.getElementById('time').innerText = new Date().toLocaleTimeString();

    } catch (e) {
        console.error("Scrape Error:", e);
        document.getElementById('metar').innerText = "SYNCHRONIZING WITH GLOBAL DATA...";
    }
}

            getAviationData();
            setInterval(getAviationData, 600000); // 10 minute refresh
        });
    </script>
</body>
</html>
