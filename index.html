<!DOCTYPE html>
<html>
<head>
    <title>EGNM Radar & Weather Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/leaflet@1.4.0/dist/leaflet.js"></script>
    <script src="https://api.windy.com/assets/map-forecast/libBoot.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
        #windy { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #overlay {
            position: absolute; top: 15px; left: 15px; z-index: 10;
            background: rgba(0, 0, 0, 0.85); padding: 15px; border-radius: 10px;
            width: 380px; border: 1px solid #333; box-shadow: 0 0 20px rgba(0,0,0,1);
        }

        #layer-picker {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 10; background: rgba(0, 0, 0, 0.9); padding: 10px;
            border-radius: 30px; border: 1px solid #444; display: flex; gap: 8px;
        }
        .layer-btn {
            background: #222; color: #fff; border: 1px solid #555; padding: 8px 12px;
            border-radius: 20px; cursor: pointer; font-size: 0.75em; transition: 0.3s;
        }
        .layer-btn.active { background: #00ff41; color: #000; font-weight: bold; }

        .label { color: #fff; font-size: 0.75em; display: block; border-bottom: 1px solid #444; margin-bottom: 5px; }

        .metar-container { width: 100%; overflow: hidden; white-space: nowrap; margin-bottom: 15px; }
        .metar-text {
            display: inline-block; color: #00ff41; font-size: 1.1em; font-weight: bold;
            animation: marquee-left 18s linear infinite; padding-left: 100%;
        }

        .taf-container { 
            height: 90px; 
            overflow: hidden; 
            position: relative; 
            border-left: 2px solid #00ff41; 
            padding-left: 10px; 
        }
        .taf-text {
            position: absolute; 
            color: #00ff41; 
            font-size: 0.95em; 
            width: 100%;
            white-space: pre-wrap; 
            animation: scroll-up 25s linear infinite; 
        }

        @keyframes marquee-left { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
        @keyframes scroll-up { 0% { transform: translateY(100%); } 100% { transform: translateY(-130%); } }

        #time { font-size: 0.6em; color: #666; margin-top: 10px; text-align: right; }
    </style>
</head>
<body>

    <div id="windy"></div>
    
    <div id="overlay">
        <span class="label">METAR - EGNM</span>
        <div class="metar-container"><div id="metar" class="metar-text">INITIALIZING...</div></div>
        <span class="label">TAF - EGNM</span>
        <div class="taf-container"><div id="taf" class="taf-text">LOADING TAF FEED...</div></div>
        <div id="time">--:--</div>
    </div>

    <div id="layer-picker">
        <button class="layer-btn active" onclick="changeLayer('radar', this)">Radar</button>
        <button class="layer-btn" onclick="changeLayer('wind', this)">Wind</button>
        <button class="layer-btn" onclick="changeLayer('temp', this)">Temp</button>
        <button class="layer-btn" onclick="changeLayer('satellite', this)">Sat</button>
        <button class="layer-btn" onclick="changeLayer('rain', this)">Rain</button>
        <button class="layer-btn" onclick="changeLayer('clouds', this)">Clouds</button>
    </div>

    <script>
        let W_API = null;

// Using your provided Pro/Plugin Key
const WINDY_KEY = 'JrOUxhIacyvx0kaURev826DuikZCUUmC'; 

const options = {
    key: WINDY_KEY,
    lat: 53.8659,
    lon: -1.6606,
    zoom: 8,
    verbose: true // This will help us see exactly why a layer fails in the console
};

windyInit(options, windyAPI => {
    W_API = windyAPI;
    const { store, broadcast } = W_API;

    store.set('baseLayer', 'dark');
    
    // Set initial view to Radar
    changeLayer('radar', document.querySelector('.layer-btn'));

    broadcast.once('redrawFinished', () => {
        setTimeout(() => broadcast.emit('p-play'), 2000);
    });
});

function changeLayer(layerKey, btn) {
    if (!W_API) return;
    const { store } = W_API;

    // 1. Determine Product & Layer Logic
    const isObs = (layerKey === 'radar' || layerKey === 'satellite');
    
    // 2. The "Clean Swap" - Clear overlay first to reset the engine
    store.set('overlay', null);

    // 3. Set the Product
    // Pro keys allow 'observation' for Radar. 
    // If 'observation' still fails, the API might expect 'radar' as the product name.
    const product = isObs ? 'observation' : 'ecmwf';
    store.set('product', product);

    // 4. Set the Overlay & Airspaces
    setTimeout(() => {
        store.set('overlay', layerKey);
        
        // Use the official plugin key for Airspaces
        store.set('displayAirspaces', true); 
        
        store.set('isolines', isObs ? 'none' : 'pressure');
    }, 100);

    // UI Update
    document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
    if(btn) btn.classList.add('active');
}

// METAR/TAF logic stays the same...
</body>
</html>
