<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGNM Aviation Weather Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --glass: rgba(15, 23, 42, 0.85);
            --text: #ffffff;
            --accent: #38bdf8;
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0f172a; color: var(--text); font-family: 'Segoe UI', sans-serif; }

        /* Map background */
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; }

        /* UI Overlays */
        #aviation-box {
            position: absolute; top: 20px; left: 20px; width: 350px;
            background: var(--glass); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            padding: 15px; z-index: 10; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 5px; font-weight: bold; }

        #metar-container { white-space: nowrap; overflow: hidden; background: rgba(0,0,0,0.4); padding: 8px; border-radius: 4px; margin-bottom: 12px; border-left: 3px solid var(--accent); }
        #metar-text { display: inline-block; animation: scroll-left 20s linear infinite; font-family: 'Courier New', monospace; font-size: 0.9rem; }

        #taf-container { height: 90px; overflow: hidden; background: rgba(0,0,0,0.4); padding: 8px; border-radius: 4px; position: relative; border-left: 3px solid var(--accent); }
        #taf-text { position: absolute; animation: scroll-up 25s linear infinite; font-family: 'Courier New', monospace; font-size: 0.85rem; width: 95%; }

        /* Layer Controls */
        #layer-selector {
            position: absolute; top: 20px; right: 20px; z-index: 10;
            display: flex; flex-direction: column; gap: 5px;
        }
        .layer-btn {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 8px 12px; border-radius: 6px; cursor: pointer;
            backdrop-filter: blur(8px); transition: 0.3s; font-size: 0.8rem;
        }
        .layer-btn:hover { background: var(--accent); color: #000; }
        .layer-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

        /* Bottom Stats */
        #stats-grid {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px;
            width: 90%; z-index: 10;
        }
        .stat-card {
            background: var(--glass); backdrop-filter: blur(10px); padding: 15px;
            border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-value { font-size: 1.2rem; font-weight: bold; margin-top: 5px; }

        @keyframes scroll-left { 0% { transform: translateX(100%); } 100% { transform: translateX(-150%); } }
        @keyframes scroll-up { 0% { top: 100%; } 100% { top: -250%; } }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="layer-selector">
		<button class="layer-btn active" onclick="updateMapLayer('precipitation', this)">Precipitation</button>
		<button class="layer-btn" onclick="updateMapLayer('temperature_2m', this)">Temperature</button>
		<button class="layer-btn" onclick="updateMapLayer('cloud_cover', this)">Clouds</button>
		<button class="layer-btn" onclick="updateMapLayer('pressure_msl', this)">Pressure</button>
		<button class="layer-btn" onclick="updateMapLayer('wind_speed_10m', this)">Wind</button>
	</div>

    <div id="aviation-box">
        <div class="label">EGNM METAR</div>
        <div id="metar-container"><span id="metar-text">Syncing...</span></div>
        <div class="label">EGNM TAF</div>
        <div id="taf-container"><div id="taf-text">Syncing...</div></div>
    </div>

    <div id="stats-grid">
        <div class="stat-card"><div class="label">Temp</div><div id="temp" class="stat-value">--</div></div>
        <div class="stat-card"><div class="label">Precip</div><div id="precip" class="stat-value">--</div></div>
        <div class="stat-card"><div class="label">Clouds</div><div id="clouds" class="stat-value">--</div></div>
        <div class="stat-card"><div class="label">MSLP</div><div id="mslp" class="stat-value">--</div></div>
        <div class="stat-card"><div class="label">Wind</div><div id="wind" class="stat-value">--</div></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 1. Constants & Configuration
// 1. Configuration
const CHECKWX_API_KEY = "5024b8a797df490cb1e783465b4ce8c3";
const EGNM_COORDS = [53.86, -1.66];
let weatherLayer; // Keeps track of the current weather overlay

// 2. Initialize Map
const map = L.map('map', { 
    zoomControl: false, 
    attributionControl: false 
}).setView(EGNM_COORDS, 8);

// Reliable Base Layer (CartoDB is very CORS-friendly)
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

// Add Marker for EGNM
L.circleMarker(EGNM_COORDS, { color: '#38bdf8', radius: 8 }).addTo(map);

// 3. Robust Layer Switcher
function updateMapLayer(layerType, element) {
    // Remove the old layer if it exists
    if (weatherLayer) {
        map.removeLayer(weatherLayer);
    }

    // Direct URL for Open-Meteo tiles. 
    // Using 'best_match' ensures the server picks the most available model.
    const tileUrl = `https://map-tiles.open-meteo.com/v1/forecast/best_match/${layerType}/{z}/{x}/{y}.png`;

    weatherLayer = L.tileLayer(tileUrl, {
        opacity: 0.6,
        zIndex: 1000,
        // The key fix for your CORS errors:
        crossOrigin: true 
    }).addTo(map);

    // Update UI button highlights
    document.querySelectorAll('.layer-btn').forEach(btn => btn.classList.remove('active'));
    if (element) element.classList.add('active');
}

// 4. Data Fetching (METAR/Stats)
async function fetchAviationData() {
    try {
        const headers = { "X-API-Key": CHECKWX_API_KEY };
        const metarRes = await fetch(`https://api.checkwx.com/metar/egnm`, { headers });
        const metarJson = await metarRes.json();
        if (metarJson.data) document.getElementById('metar-text').innerText = metarJson.data[0];

        const tafRes = await fetch(`https://api.checkwx.com/taf/egnm`, { headers });
        const tafJson = await tafRes.json();
        if (tafJson.data) document.getElementById('taf-text').innerText = tafJson.data[0];
    } catch (e) { console.error("Aviation Data Error:", e); }
}

async function fetchWeather() {
    try {
        const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=53.86&longitude=-1.66&current=temperature_2m,precipitation,cloud_cover,pressure_msl,wind_speed_10m&wind_speed_unit=kn");
        const data = await res.json();
        const cur = data.current;
        
        document.getElementById('temp').innerText = `${cur.temperature_2m}°C`;
        document.getElementById('precip').innerText = `${cur.precipitation} mm`;
        document.getElementById('clouds').innerText = `${cur.cloud_cover}%`;
        document.getElementById('mslp').innerText = `${cur.pressure_msl} hPa`;
        document.getElementById('wind').innerText = `${cur.wind_speed_10m} kt`;
    } catch (e) { console.error("Weather Data Error:", e); }
}

// Initial Load
updateMapLayer('precipitation');
fetchAviationData();
fetchWeather();
		setInterval(fetchAviationData, 300000);
		setInterval(fetchWeather, 300000);
    </script>
</body>
</html>
