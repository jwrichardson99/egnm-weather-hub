<!DOCTYPE html>
<html>
<head>
    <title>EGNM Radar & Weather</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/leaflet@1.4.0/dist/leaflet.js"></script>
    <script src="https://api.windy.com/assets/map-forecast/libBoot.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        #windy { width: 100vw; height: 100vh; }
        
        #aviation-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.85);
            color: #00ff41; /* "Matrix" green */
            padding: 15px;
            border-radius: 10px;
            width: 350px;
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,1);
        }

        .label { color: #fff; font-size: 0.75em; margin-bottom: 5px; display: block; border-bottom: 1px solid #444; }
        
        /* The Scrolling Container */
        .scroll-container {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            margin-bottom: 15px;
        }

        .scroll-text {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 20s linear infinite;
            font-size: 1.1em;
            font-weight: bold;
        }

        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        #status { font-size: 0.6em; color: #666; text-align: right; }
    </style>
</head>
<body>

    <div id="windy"></div>
    
    <div id="aviation-overlay">
        <span class="label">METAR - EGNM</span>
        <div class="scroll-container">
            <div id="metar" class="scroll-text">CONNECTING TO NOAA...</div>
        </div>

        <span class="label">TAF - EGNM</span>
        <div class="scroll-container">
            <div id="taf" class="scroll-text">WAITING FOR DATA...</div>
        </div>
        <div id="status">Updated: <span id="time">--:--</span></div>
    </div>

    <script>
        const WINDY_KEY = 'EMwvN9THbhR1U1SJHzsqdHAmonM0Nhne';

        windyInit({ key: WINDY_KEY, lat: 53.8659, lon: -1.6606, zoom: 8 }, windyAPI => {
            const { store, broadcast } = windyAPI;
            store.set('baseLayer', 'dark');
            store.set('overlay', 'radar');
            
            // Auto-play radar animation
            setTimeout(() => { broadcast.emit('p-play'); }, 2000);

            async function getAviationData() {
                const icao = 'EGNM';
                // The official 2026 NOAA AWC Endpoint
                const targetUrl = `https://aviationweather.gov/api/data/metar?ids=${icao}&format=json&taf=true`;
                const proxiedUrl = `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`;
            
                try {
                    const response = await fetch(proxiedUrl);
                    if (!response.ok) throw new Error('Network response was not ok');
                    
                    const data = await response.json();
            
                    // 2026 Update: NOAA returns an array of station objects
                    if (data && data.length > 0) {
                        const report = data[0];
                        
                        // In 2026, 'raw_text' is the standard field name
                        const metarStr = report.raw_text || "METAR CURRENTLY UNAVAILABLE";
                        const tafStr = report.rawTaf || report.taf_raw || "TAF CURRENTLY UNAVAILABLE";
            
                        document.getElementById('metar').innerText = metarStr;
                        document.getElementById('taf').innerText = tafStr;
                        
                        document.getElementById('time').innerText = new Date().toLocaleTimeString();
                    } else {
                        document.getElementById('metar').innerText = "STATION EGNM NOT REPORTING AT THIS TIME";
                    }
                } catch (e) {
                    console.error("Fetch Error:", e);
                    document.getElementById('metar').innerText = "RECONNECTING TO NOAA DATA STREAM...";
                }
            }

            getAviationData();
            setInterval(getAviationData, 600000); // 10 minute refresh
        });
    </script>
</body>
</html>
