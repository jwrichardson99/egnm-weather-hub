<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGNM Aviation Weather Dashboard</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e; /* Fallback */
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        /* METAR/TAF Box */
        #aviation-box {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 350px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 10px;
            z-index: 10;
        }

        .label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.7; margin-bottom: 4px; }

        /* Horizontal Scroll for METAR */
        #metar-container {
            white-space: nowrap;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
            padding: 5px;
            margin-bottom: 10px;
        }
        #metar-text {
            display: inline-block;
            animation: scroll-left 15s linear infinite;
        }

        /* Vertical Scroll for TAF */
        #taf-container {
            height: 80px;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
            padding: 5px;
            position: relative;
        }
        #taf-text {
            position: absolute;
            animation: scroll-up 20s linear infinite;
        }

        /* Weather Stats Grid */
        #stats-grid {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            width: 90%;
        }

        .stat-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        @keyframes scroll-left {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        @keyframes scroll-up {
            0% { top: 100%; }
            100% { top: -150%; }
        }
    </style>
</head>
<body>

    <div id="aviation-box">
        <div class="label">EGNM METAR</div>
        <div id="metar-container"><span id="metar-text">Loading METAR...</span></div>
        <div class="label">EGNM TAF</div>
        <div id="taf-container"><div id="taf-text">Loading TAF...</div></div>
    </div>

    <div id="stats-grid">
        <div class="stat-card">
            <div class="label">Temperature</div>
            <div id="temp">--</div>
        </div>
        <div class="stat-card">
            <div class="label">Precipitation</div>
            <div id="precip">--</div>
        </div>
        <div class="stat-card">
            <div class="label">Cloud Cover</div>
            <div id="clouds">--</div>
        </div>
        <div class="stat-card">
            <div class="label">Pressure</div>
            <div id="mslp">--</div>
        </div>
        <div class="stat-card">
            <div class="label">Wind</div>
            <div id="wind">--</div>
        </div>
    </div>

    <script>
        const PROXY = "https://api.allorigins.win/raw?url=";
        const METAR_URL = "https://tgftp.nws.noaa.gov/data/observations/metar/stations/EGNM.TXT";
        const TAF_URL = "https://tgftp.nws.noaa.gov/data/forecasts/taf/stations/EGNM.TXT";
        
        // Open-Meteo for EGNM (Leeds Bradford coords: 53.86, -1.66)
        const WEATHER_URL = "https://api.open-meteo.com/v1/forecast?latitude=53.86&longitude=-1.66&current=temperature_2m,precipitation,cloud_cover,pressure_msl,wind_speed_10m";

        async function fetchAviationData() {
            try {
                const metarRes = await fetch(PROXY + encodeURIComponent(METAR_URL));
                const metarData = await metarRes.text();
                document.getElementById('metar-text').innerText = metarData.replace(/\n/g, ' ');

                const tafRes = await fetch(PROXY + encodeURIComponent(TAF_URL));
                const tafData = await tafRes.text();
                document.getElementById('taf-text').innerText = tafData;
            } catch (e) {
                console.error("Aviation data error:", e);
            }
        }

        async function fetchWeather() {
            try {
                const res = await fetch(WEATHER_URL);
                const data = await res.json();
                const cur = data.current;

                document.getElementById('temp').innerText = `${cur.temperature_2m}°C`;
                document.getElementById('precip').innerText = `${cur.precipitation} mm`;
                document.getElementById('clouds').innerText = `${cur.cloud_cover}%`;
                document.getElementById('mslp').innerText = `${cur.pressure_msl} hPa`;
                document.getElementById('wind').innerText = `${cur.wind_speed_10m} km/h`;
            } catch (e) {
                console.error("Weather data error:", e);
            }
        }

        // Initialize
        fetchAviationData();
        fetchWeather();
        // Refresh every 5 minutes
        setInterval(() => { fetchAviationData(); fetchWeather(); }, 300000);
    </script>
</body>
</html>
