<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGNM Aviation Weather Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="icon" href="data:,">
    <style>
        :root {
            --glass: rgba(15, 23, 42, 0.85);
            --text: #ffffff;
            --accent: #38bdf8;
        }

        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #0f172a; color: var(--text); font-family: 'Segoe UI', sans-serif; }

        /* Map background */
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; }

        /* UI Overlays */
        #aviation-box {
            position: absolute; top: 20px; left: 20px; width: 350px;
            background: var(--glass); backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            padding: 15px; z-index: 10; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 5px; font-weight: bold; }

        #metar-container { white-space: nowrap; overflow: hidden; background: rgba(0,0,0,0.4); padding: 8px; border-radius: 4px; margin-bottom: 12px; border-left: 3px solid var(--accent); }
        #metar-text { display: inline-block; animation: scroll-left 20s linear infinite; font-family: 'Courier New', monospace; font-size: 0.9rem; }

        #taf-container { height: 90px; overflow: hidden; background: rgba(0,0,0,0.4); padding: 8px; border-radius: 4px; position: relative; border-left: 3px solid var(--accent); }
        #taf-text { position: absolute; animation: scroll-up 25s linear infinite; font-family: 'Courier New', monospace; font-size: 0.85rem; width: 95%; }

        /* Layer Controls */
        #layer-selector {
            position: absolute; top: 20px; right: 20px; z-index: 10;
            display: flex; flex-direction: column; gap: 5px;
        }
        .layer-btn {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 8px 12px; border-radius: 6px; cursor: pointer;
            backdrop-filter: blur(8px); transition: 0.3s; font-size: 0.8rem;
        }
        .layer-btn:hover { background: var(--accent); color: #000; }
        .layer-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

        /* Bottom Stats */
        #stats-grid {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px;
            width: 90%; z-index: 10;
        }
        .stat-card {
            background: var(--glass); backdrop-filter: blur(10px); padding: 15px;
            border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-value { font-size: 1.1rem; font-weight: bold; margin-top: 5px; }

        @keyframes scroll-left { 0% { transform: translateX(100%); } 100% { transform: translateX(-150%); } }
        @keyframes scroll-up { 0% { top: 100%; } 100% { top: -250%; } }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="layer-selector">
        <button class="layer-btn active" onclick="updateMapLayer('radar', this)">Precipitation</button>
        <button class="layer-btn" onclick="updateMapLayer('satellite', this)">Infrared Sat</button>
    </div>

    <div id="aviation-box">
        <div class="label">EGNM METAR</div>
        <div id="metar-container"><span id="metar-text">Syncing...</span></div>
        <div class="label">EGNM TAF</div>
        <div id="taf-container"><div id="taf-text">Syncing...</div></div>
    </div>

    <div id="stats-grid">
        <div class="stat-card"><div class="label">Temp</div><div id="temp" class="stat-value">--</div></div>
        <div class="stat-card"><div class="label">Precip</div><div id="precip" class="stat-value">--</div></div>
        <div class="stat-card"><div class="label">Clouds</div><div id="clouds" class="stat-value">--</div></div>
        <div class="stat-card"><div class="label">MSLP</div><div id="mslp" class="stat-value">--</div></div>
        <div class="stat-card"><div class="label">Wind</div><div id="wind" class="stat-value">--</div></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
const CHECKWX_API_KEY = "5024b8a797df490cb1e783465b4ce8c3";
const EGNM_COORDS = [53.86, -1.66];
let weatherLayer;

// 1. Initialize Map
const map = L.map('map', { zoomControl: false, attributionControl: false }).setView(EGNM_COORDS, 8);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
L.circleMarker(EGNM_COORDS, { color: '#38bdf8', radius: 8 }).addTo(map);

// 2. RainViewer Integration (Fixed "Time Data Missing" Logic)
async function updateMapLayer(type = 'radar', element = null) {
    if (weatherLayer) map.removeLayer(weatherLayer);

    try {
        const rvRes = await fetch('https://api.rainviewer.com/public/weather-maps.json');
        const rvData = await rvRes.json();
        
        let latestTime;

        // Logic to handle different data paths for Radar vs Satellite
        if (type === 'satellite') {
            // Check if satellite data exists before getting the last time
            const satArray = rvData.satellite?.infrared;
            if (satArray && satArray.length > 0) {
                latestTime = satArray[satArray.length - 1].time;
            }
        } else {
            // Standard radar path
            const radArray = rvData.radar?.past;
            if (radArray && radArray.length > 0) {
                latestTime = radArray[radArray.length - 1].time;
            }
        }

        // Final safety check: If we still don't have a time, use a rounded current timestamp
        if (!latestTime) {
            latestTime = Math.floor(Date.now() / 1000) - (Math.floor(Date.now() / 1000) % 600);
            console.warn("Time data missing from API, using fallback.");
        }

        const tileUrl = `https://tilecache.rainviewer.com/v2/${type}/${latestTime}/256/{z}/{x}/{y}/2/1_1.png`;

        weatherLayer = L.tileLayer(tileUrl, {
            opacity: 0.6,
            zIndex: 1000
        }).addTo(map);

    } catch (e) {
        console.error("RainViewer Error:", e.message);
    }

    if (element) {
        document.querySelectorAll('.layer-btn').forEach(btn => btn.classList.remove('active'));
        element.classList.add('active');
    }
}

// 3. Aviation Data (FIXES THE REFERENCE ERROR)
async function fetchAviationData() {
    try {
        const headers = { "X-API-Key": CHECKWX_API_KEY };
        const [mRes, tRes] = await Promise.all([
            fetch(`https://api.checkwx.com/metar/egnm`, { headers }),
            fetch(`https://api.checkwx.com/taf/egnm`, { headers })
        ]);
        const mData = await mRes.json();
        const tData = await tRes.json();

        document.getElementById('metar-text').innerText = mData.data?.[0] || "No METAR Available";
        document.getElementById('taf-text').innerText = tData.data?.[0] || "No TAF Available";
    } catch (e) { 
        console.error("Aviation Data Error:", e);
        document.getElementById('metar-text').innerText = "Sync Error";
    }
}

// 4. Stats Data (Including Degrees for Wind)
async function fetchWeather() {
    try {
        const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=53.86&longitude=-1.66&current=temperature_2m,precipitation,cloud_cover,pressure_msl,wind_speed_10m,wind_direction_10m&wind_speed_unit=kn");
        const data = await res.json();
        const cur = data.current;
        
        document.getElementById('temp').innerText = `${cur.temperature_2m}°C`;
        document.getElementById('precip').innerText = `${cur.precipitation} mm`;
        document.getElementById('clouds').innerText = `${cur.cloud_cover}%`;
        document.getElementById('mslp').innerText = `${cur.pressure_msl} hPa`;
        
        // Finalized wind display: [Degrees]° @ [Speed] kt
        document.getElementById('wind').innerText = `${cur.wind_direction_10m}° @ ${cur.wind_speed_10m} kt`;
    } catch (e) { 
        console.error("Stats Fetch Error:", e); 
    }
}

// 5. Initial Execution Sequence
// We define functions first, then run them to ensure no ReferenceErrors occur
updateMapLayer('radar');
fetchAviationData();
fetchWeather();

// Automatic Refresh (Every 5 minutes)
setInterval(fetchAviationData, 300000);
setInterval(fetchWeather, 300000);
    </script>
</body>
</html>
