<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGNM Aviation Weather Dashboard</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e; /* Fallback */
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        /* METAR/TAF Box */
        #aviation-box {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 350px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 10px;
            z-index: 10;
        }

        .label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.7; margin-bottom: 4px; }

        /* Horizontal Scroll for METAR */
        #metar-container {
            white-space: nowrap;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
            padding: 5px;
            margin-bottom: 10px;
        }
        #metar-text {
            display: inline-block;
            animation: scroll-left 15s linear infinite;
        }

        /* Vertical Scroll for TAF */
        #taf-container {
            height: 80px;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
            padding: 5px;
            position: relative;
        }
        #taf-text {
            position: absolute;
            animation: scroll-up 20s linear infinite;
        }

        /* Weather Stats Grid */
        #stats-grid {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            width: 90%;
        }

        .stat-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        @keyframes scroll-left {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        @keyframes scroll-up {
            0% { top: 100%; }
            100% { top: -150%; }
        }
    </style>
</head>
<body>

    <div id="aviation-box">
        <div class="label">EGNM METAR</div>
        <div id="metar-container"><span id="metar-text">Loading METAR...</span></div>
        <div class="label">EGNM TAF</div>
        <div id="taf-container"><div id="taf-text">Loading TAF...</div></div>
    </div>

    <div id="stats-grid">
        <div class="stat-card">
            <div class="label">Temperature</div>
            <div id="temp">--</div>
        </div>
        <div class="stat-card">
            <div class="label">Precipitation</div>
            <div id="precip">--</div>
        </div>
        <div class="stat-card">
            <div class="label">Cloud Cover</div>
            <div id="clouds">--</div>
        </div>
        <div class="stat-card">
            <div class="label">Pressure</div>
            <div id="mslp">--</div>
        </div>
        <div class="stat-card">
            <div class="label">Wind</div>
            <div id="wind">--</div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
const METAR_URL = "https://tgftp.nws.noaa.gov/data/observations/metar/stations/EGNM.TXT";
const TAF_URL = "https://tgftp.nws.noaa.gov/data/forecasts/taf/stations/EGNM.TXT";
const WEATHER_URL = "https://api.open-meteo.com/v1/forecast?latitude=53.86&longitude=-1.66&current=temperature_2m,precipitation,cloud_cover,pressure_msl,wind_speed_10m";

// Using AllOrigins with a wrapper to avoid 403 Forbidden issues
const getProxiedData = async (url) => {
    const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}&t=${Date.now()}`);
    if (!response.ok) throw new Error('Network response was not ok');
    const json = await response.json();
    return json.contents; // AllOrigins wraps the text in a 'contents' property
};

async function fetchAviationData() {
    try {
        const metarData = await getProxiedData(METAR_URL);
        document.getElementById('metar-text').innerText = metarData.replace(/\n/g, ' ').trim();

        const tafData = await getProxiedData(TAF_URL);
        document.getElementById('taf-text').innerText = tafData.trim();
        
    } catch (e) {
        console.error("Aviation data error:", e);
        document.getElementById('metar-text').innerText = "Aviation Data Syncing... (Check back in a moment)";
    }
}

async function fetchWeather() {
    try {
        const res = await fetch(WEATHER_URL);
        if (!res.ok) throw new Error('Weather API error');
        const data = await res.json();
        const cur = data.current;

        document.getElementById('temp').innerText = `${cur.temperature_2m}°C`;
        document.getElementById('precip').innerText = `${cur.precipitation} mm`;
        document.getElementById('clouds').innerText = `${cur.cloud_cover}%`;
        document.getElementById('mslp').innerText = `${cur.pressure_msl} hPa`;
        document.getElementById('wind').innerText = `${cur.wind_speed_10m} km/h`;
    } catch (e) {
        console.error("Weather data error:", e);
    }
}

// --- INITIALIZE ---
fetchAviationData();
fetchWeather();

// Refresh every 5 minutes
setInterval(() => { 
    fetchAviationData(); 
    fetchWeather(); 
}, 300000);
    </script>
</body>
</html>
